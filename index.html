<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Validação · Hairnor 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #171717;
      --surface2: #1f1f1f;
      --border:   #2a2a2a;
      --accent:   #dd358c;
      --accent2:  #ff6ab5;
      --text:     #f0f0f0;
      --muted:    #666;
      --green:    #3ecf6e;
      --amber:    #f5a623;
      --red:      #f04040;
      --green-bg: rgba(62,207,110,0.10);
      --amber-bg: rgba(245,166,35,0.10);
      --red-bg:   rgba(240,64,64,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    #app {
      width: 100%; max-width: 480px;
      margin: 0 auto; min-height: 100svh;
      display: flex; flex-direction: column;
      background: var(--bg);
      position: relative; overflow: hidden;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex; align-items: center;
      gap: 12px; padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .hdr-logo {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      flex-shrink: 0;
    }
    .hdr-info { flex: 1; }
    .hdr-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .hdr-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .hdr-count {
      font-family: 'Space Mono', monospace;
      font-size: 20px; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .hdr-count-lbl { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }

    /* ── STATUS BAR ── */
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 500;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%; flex-shrink: 0;
      background: var(--red);
    }
    .dot.ok   { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.spin-anim {
      background: var(--accent);
      animation: dotPulse 1s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── CAMERA ── */
    .cam {
      position: relative; width: 100%;
      height: 260px;
      background: #000; overflow: hidden; flex-shrink: 0;
    }
    /* O html5-qrcode injeta divs e vídeo com estilos inline — sobrescrevemos tudo */
    #reader { width: 100% !important; height: 100% !important; }
    #reader > div { border: none !important; box-shadow: none !important; }
    #reader video {
      position: absolute !important;
      top: 50% !important; left: 50% !important;
      transform: translate(-50%, -50%) !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      min-width: 100% !important; min-height: 100% !important;
    }
    #reader img   { display: none !important; }
    /* Esconde TODOS os elementos decorativos injetados pelo html5-qrcode */
    #reader div[style*="border"],
    #reader div[style*="box-shadow"],
    #reader svg,
    #reader canvas { display: none !important; }

    /* Corner frame */
    .frame {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .box { width: 190px; height: 190px; position: relative; }
    .box::before, .box::after, .box span::before, .box span::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border-color: var(--accent);
      border-style: solid;
    }
    .box::before  { top:0;    left:0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .box::after   { top:0;    right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .box span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .box span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Scan line */
    .line {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 160px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      animation: scan 2.4s ease-in-out infinite;
      z-index: 11;
    }
    @keyframes scan {
      0%,100% { margin-top: -74px; opacity: 0.2; }
      50%      { margin-top:  74px; opacity: 1;   }
    }
    .cam-hint {
      position: absolute; bottom: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; font-family: 'Space Mono', monospace;
      color: rgba(255,255,255,0.35);
      white-space: nowrap; z-index: 10;
      letter-spacing: 0.06em;
    }

    /* Overlay escuro sobre a câmera quando pausado */
    .cam-overlay {
      position: absolute; inset: 0; z-index: 12;
      background: rgba(13,13,13,0.7);
      display: none; align-items: center; justify-content: center;
    }
    .cam-overlay.on { display: flex; }
    .cam-overlay-txt {
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--accent);
      letter-spacing: 0.1em;
    }

    /* ── INPUT ZONE ── */
    .inp-zone {
      padding: 16px 18px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .inp-lbl {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .cpf-badge {
      font-size: 9px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      background: rgba(221,53,140,0.15);
      color: var(--accent2);
      text-transform: none; letter-spacing: 0.02em;
      opacity: 0; transition: opacity 0.2s;
      border: 1px solid rgba(221,53,140,0.3);
    }
    .inp-row { display: flex; gap: 10px; }

    #inp {
      flex: 1; height: 52px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 16px; font-family: 'Space Mono', monospace;
      padding: 0 16px; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
      letter-spacing: 0.04em;
    }
    #inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(221,53,140,0.15);
    }
    #inp:disabled { opacity: 0.4; cursor: not-allowed; }
    #inp::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 0.02em; }

    #btn {
      height: 52px; padding: 0 20px; min-width: 100px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.04em;
    }
    #btn:active:not(:disabled) { opacity: 0.8; transform: scale(0.97); }
    #btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-spinner {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0; display: none;
    }
    #btn.loading .btn-spinner { display: block; }
    #btn.loading .btn-txt     { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── COUNTERS ── */
    .ctrs {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding: 12px 18px 18px;
      background: var(--bg);
    }
    .c {
      padding: 14px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      background: var(--surface);
      position: relative; overflow: hidden;
    }
    .c::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .c.gn::before { background: var(--green); }
    .c.am::before { background: var(--amber); }
    .c.rd::before { background: var(--red);   }

    .c-n {
      font-family: 'Space Mono', monospace;
      font-size: 26px; font-weight: 700; line-height: 1;
    }
    .c-l { font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: 0.04em; }
    .gn .c-n { color: var(--green); }
    .am .c-n { color: var(--amber); }
    .rd .c-n { color: var(--red);   }

    /* ── MODAL ── */
    .modal-wrap {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: flex-end; justify-content: center;
      z-index: 50;
      backdrop-filter: blur(4px);
    }
    .modal-wrap.on { display: flex; }

    .modal-box {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 10px 24px 36px;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      border-top: 1px solid var(--border);
      animation: slideUp 0.28s cubic-bezier(0.34,1.36,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 4px;
    }

    .m-i {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700;
    }
    .mi-v { background: var(--green-bg); color: var(--green); border: 1.5px solid rgba(62,207,110,0.3); }
    .mi-u { background: var(--amber-bg); color: var(--amber); border: 1.5px solid rgba(245,166,35,0.3); }
    .mi-x { background: var(--red-bg);   color: var(--red);   border: 1.5px solid rgba(240,64,64,0.3);  }

    .m-t {
      font-size: 20px; font-weight: 700;
      color: var(--text); text-align: center;
    }
    .m-d {
      font-size: 13px; color: var(--muted);
      text-align: center; line-height: 1.6;
    }
    .m-c {
      font-family: 'Space Mono', monospace;
      font-size: 11px; padding: 8px 16px;
      border-radius: 8px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      word-break: break-all; text-align: center;
      width: 100%; letter-spacing: 0.06em;
    }
    .m-b {
      width: 100%; height: 54px; margin-top: 4px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }
    .m-b:active { opacity: 0.8; transform: scale(0.98); }
    .mb-v { background: var(--green); color: #fff; }
    .mb-u { background: var(--amber); color: #fff; }
    .mb-x { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">HAIRNOR</div>
    <div class="hdr-info">
      <div class="hdr-title">Validação de Ingresso</div>
      <div class="hdr-sub">Aponte a câmera para o QR Code</div>
    </div>
    <div>
      <div class="hdr-count" id="total-count">0</div>
      <div class="hdr-count-lbl">validações</div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status">
    <div class="dot" id="sdot"></div>
    <span id="stxt">Iniciando câmera...</span>
  </div>

  <!-- CAMERA -->
  <div class="cam">
    <div id="reader"></div>
    <div class="frame"><div class="box"><span></span></div></div>
    <div class="line"></div>
    <span class="cam-hint">ENQUADRE O QR CODE NO CENTRO</span>
    <div class="cam-overlay" id="cam-overlay">
      <span class="cam-overlay-txt">PROCESSANDO...</span>
    </div>
  </div>

  <!-- INPUT -->
  <div class="inp-zone">
    <div class="inp-lbl">
      Código ou CPF
      <span class="cpf-badge" id="cpf-badge">✓ CPF detectado</span>
    </div>
    <div class="inp-row">
      <input id="inp" type="text" inputmode="text"
             placeholder="000.000.000-00 ou código..."
             maxlength="18" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="btn" onclick="validarManual()">
        <div class="btn-spinner"></div>
        <span class="btn-txt">Validar</span>
      </button>
    </div>
  </div>

  <!-- COUNTERS -->
  <div class="ctrs">
    <div class="c gn">
      <div class="c-n" id="cn-v">0</div>
      <div class="c-l">Liberados</div>
    </div>
    <div class="c am">
      <div class="c-n" id="cn-u">0</div>
      <div class="c-l">Já usados</div>
    </div>
    <div class="c rd">
      <div class="c-n" id="cn-x">0</div>
      <div class="c-l">Inválidos</div>
    </div>
  </div>

  <!-- MODAL (bottom sheet) -->
  <div class="modal-wrap" id="mw">
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="m-i" id="mi"></div>
      <div class="m-t" id="mt"></div>
      <div class="m-d" id="md"></div>
      <div class="m-c" id="mc"></div>
      <button class="m-b" id="mb" onclick="fechar()">Próxima leitura</button>
    </div>
  </div>

</div>
<script>
  const API = "https://script.google.com/macros/s/AKfycbwKG0kjpDcCrNYHyInY-WMxN9y9VDP6d1H0MnQct9-5iBpKS4_oNRLrQYpg7TTK6t-S/exec";
  let scanner = null, pausado = false;
  const cnt = { v: 0, u: 0, x: 0 };

  function setStatus(txt, modo) {
    document.getElementById('stxt').textContent = txt;
    const d = document.getElementById('sdot');
    d.className = 'dot' + (modo === 'ok' ? ' ok' : modo === 'loading' ? ' spin-anim' : '');
  }

  function setLoading(on) {
    const btn = document.getElementById('btn');
    const inp = document.getElementById('inp');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
    inp.disabled = on;
    document.getElementById('cam-overlay').classList.toggle('on', on);
  }

  // Normaliza CPF: remove apóstrofos em todas as variantes Unicode,
  // pontuação de formatação e espaços.
  // padStart(11,'0') corrige zeros à esquerda perdidos caso o valor
  // tenha passado por conversão numérica em algum ponto.
  function normalizar(v) {
    let s = String(v).trim()
      .replace(/^[\u0027\u2018\u2019\u02BC]+/, '') // apóstrofos
      .replace(/[.\-\/\s]/g, '')                     // pontuação CPF
      .trim();
    if (/^\d+$/.test(s) && s.length < 11) s = s.padStart(11, '0');
    return s;
  }

  function iniciar() {
    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 12, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
      (txt) => {
        if (pausado) return;
        pausado = true;
        document.getElementById('inp').value = txt;
        chamarAPI(normalizar(txt));
      },
      () => {}
    )
    .then(() => setStatus('Câmera ativa — aguardando leitura', 'ok'))
    .catch(() => setStatus('Câmera indisponível — use o campo abaixo', 'err'));
  }

  async function chamarAPI(codigo) {
    setLoading(true);
    setStatus('Validando...', 'loading');
    try {
      const r = await fetch(API + '?codigo=' + encodeURIComponent(codigo));
      const t = await r.text();
      if      (t.includes('✅'))  abrir('v', 'Brinde liberado!',      'Cadastro confirmado. Pode entregar o brinde.', codigo);
      else if (t.includes('⚠️')) abrir('u', 'Já foi utilizado',      'Este CPF já teve o brinde retirado.',          codigo);
      else                        abrir('x', 'Código inválido',       'CPF não encontrado na lista de participantes.', codigo);
    } catch (e) {
      abrir('x', 'Erro de conexão', 'Verifique sua internet e tente novamente.', codigo);
    } finally {
      setLoading(false);
      setStatus('Câmera ativa — aguardando leitura', 'ok');
    }
  }

  function abrir(t, titulo, msg, codigo) {
    const ic  = { v: '✓', u: '!', x: '✕' };
    const lbl = { v: 'Próxima leitura', u: 'Próxima leitura', x: 'Fechar' };

    // Formata CPF se for 11 dígitos
    const cpfFormatado = /^\d{11}$/.test(codigo)
      ? codigo.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4')
      : codigo;

    document.getElementById('mi').className   = 'm-i mi-' + t;
    document.getElementById('mi').textContent  = ic[t];
    document.getElementById('mt').textContent  = titulo;
    document.getElementById('md').textContent  = msg;
    document.getElementById('mc').textContent  = cpfFormatado;
    document.getElementById('mb').className    = 'm-b mb-' + t;
    document.getElementById('mb').textContent  = lbl[t];
    document.getElementById('mw').className    = 'modal-wrap on';

    cnt[t]++;
    document.getElementById('cn-' + t).textContent = cnt[t];
    document.getElementById('total-count').textContent = cnt.v + cnt.u + cnt.x;
  }

  function fechar() {
    document.getElementById('mw').className = 'modal-wrap';
    document.getElementById('inp').value = '';
    document.getElementById('cpf-badge').style.opacity = '0';
    pausado = false;
  }

  function validarManual() {
    const v = document.getElementById('inp').value.trim();
    if (!v) { document.getElementById('inp').focus(); return; }
    if (pausado) return;
    pausado = true;
    chamarAPI(normalizar(v));
  }

  // Detecta CPF e formata no input apenas quando os 11 dígitos forem digitados
  document.getElementById('inp').addEventListener('input', function () {
    // Extrai só os dígitos do que o usuário digitou (sem aplicar padStart ainda)
    const apenasDigitos = this.value.replace(/\D/g, '');
    const badge = document.getElementById('cpf-badge');

    if (apenasDigitos.length === 11) {
      // Todos os 11 dígitos presentes: aplica a máscara
      this.value = apenasDigitos.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      badge.style.opacity = '1';
    } else {
      // Ainda digitando: não interfere, só limpa o badge
      badge.style.opacity = '0';
    }
  });

  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') validarManual();
  });

  window.addEventListener('load', () => setTimeout(iniciar, 300));
</script>
</body>
</html>
